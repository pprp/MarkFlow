appId: com.markflow.app
productName: MarkFlow
electronVersion: 33.4.11
directories:
  output: ../../dist-desktop
  buildResources: build
files:
  - dist/**/*
  - "!dist/**/*.map"
extraResources:
  - from: ../editor/dist
    to: editor
  - from: build/cli
    to: cli
extraMetadata:
  main: dist/main/index.js
afterPack: ../../scripts/build/adHocSignMacApp.mjs
fileAssociations:
  - ext: md
    name: Markdown Document
    description: Markdown file
    role: Editor
    mimeType: text/markdown
  - ext: markdown
    name: Markdown Document
    description: Markdown file
    role: Editor
    mimeType: text/markdown

mac:
  category: public.app-category.productivity
  # Sign with Developer ID if CSC_LINK + CSC_KEY_PASSWORD env vars are set.
  # If not set, the afterPack hook applies an ad-hoc signature so local builds
  # have a valid bundle signature. Users may still need `xattr -cr MarkFlow.app`
  # to bypass Gatekeeper quarantine on downloaded unsigned builds.
  identity: null   # set to "Developer ID Application: Your Name (TEAMID)" when signing
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false  # set to true and configure APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD when notarizing
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  target:
    - target: nsis
      arch: [x64]
linux:
  category: Office
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
dmg:
  title: MarkFlow ${version}
