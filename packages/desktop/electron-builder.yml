appId: com.markflow.app
productName: MarkFlow
directories:
  output: ../../dist-mac
  buildResources: build
files:
  - dist/**/*
  - "!dist/**/*.map"
extraResources:
  - from: ../editor/dist
    to: editor
extraMetadata:
  main: dist/main/index.js
fileAssociations:
  - ext: md
    name: Markdown Document
    description: Markdown file
    role: Editor
    mimeType: text/markdown
  - ext: markdown
    name: Markdown Document
    description: Markdown file
    role: Editor
    mimeType: text/markdown

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
dmg:
  title: MarkFlow ${version}
