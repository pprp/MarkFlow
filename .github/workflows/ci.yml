name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  release-beta:
    name: Beta Release (${{ matrix.label }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test, build]
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: macOS
            platform: mac
            runs-on: macos-latest
            build-command: pnpm --filter @markflow/desktop exec electron-builder --config electron-builder.yml --mac --publish always
          - label: Windows
            platform: win
            runs-on: windows-latest
            build-command: pnpm --filter @markflow/desktop exec electron-builder --config electron-builder.yml --win nsis --publish always
          - label: Linux
            platform: linux
            runs-on: ubuntu-latest
            build-command: pnpm --filter @markflow/desktop exec electron-builder --config electron-builder.yml --linux AppImage deb --publish always
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Linux smoke-test dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Build and publish Electron beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
        run: ${{ matrix.build-command }}
      - name: Smoke-test macOS DMG
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          runner_arch="$(uname -m)"
          arch_pattern='*.dmg'
          if [[ "$runner_arch" == "arm64" ]]; then
            arch_pattern='*arm64*.dmg'
          elif [[ "$runner_arch" == "x86_64" ]]; then
            arch_pattern='*x64*.dmg'
          fi
          dmg_path="$(find dist-desktop -maxdepth 1 -type f -name "$arch_pattern" | head -n 1)"
          if [[ -z "$dmg_path" ]]; then
            dmg_path="$(find dist-desktop -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          fi
          if [[ -z "$dmg_path" ]]; then
            echo "No macOS DMG artifact found in dist-desktop"
            exit 1
          fi

          mount_point="$(mktemp -d /tmp/markflow-dmg-XXXXXX)"
          cleanup() {
            hdiutil detach "$mount_point" -quiet >/dev/null 2>&1 || true
            rm -rf "$mount_point"
          }
          trap cleanup EXIT

          hdiutil attach "$dmg_path" -nobrowse -mountpoint "$mount_point" -quiet
          executable_path="$(find "$mount_point" -maxdepth 3 -path '*/MarkFlow.app/Contents/MacOS/MarkFlow' | head -n 1)"
          if [[ -z "$executable_path" ]]; then
            echo "Mounted DMG did not expose MarkFlow.app"
            exit 1
          fi

          node scripts/ci/smoke-packaged-app.mjs --executable "$executable_path"
      - name: Smoke-test Windows NSIS installer
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist-desktop -Filter *.exe -File | Select-Object -First 1
          if (-not $installer) {
            throw 'No Windows NSIS artifact found in dist-desktop'
          }

          Start-Process -FilePath $installer.FullName -ArgumentList '/S' -Wait -NoNewWindow

          $candidatePaths = @(
            (Join-Path $env:LOCALAPPDATA 'Programs/MarkFlow/MarkFlow.exe'),
            (Join-Path ${env:ProgramFiles} 'MarkFlow/MarkFlow.exe'),
            (Join-Path ${env:ProgramFiles(x86)} 'MarkFlow/MarkFlow.exe')
          ) | Where-Object { $_ -and (Test-Path $_) }

          $executable = $candidatePaths | Select-Object -First 1
          if (-not $executable) {
            $searchRoots = @(
              (Join-Path $env:LOCALAPPDATA 'Programs'),
              ${env:ProgramFiles},
              ${env:ProgramFiles(x86)}
            ) | Where-Object { $_ -and (Test-Path $_) }

            $match = Get-ChildItem -Path $searchRoots -Filter MarkFlow.exe -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($match) {
              $executable = $match.FullName
            }
          }

          if (-not $executable) {
            throw 'MarkFlow.exe was not found after silent NSIS install'
          }

          node scripts/ci/smoke-packaged-app.mjs --executable "$executable"
      - name: Smoke-test Linux AppImage and DEB
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          appimage_path="$(find dist-desktop -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          deb_path="$(find dist-desktop -maxdepth 1 -type f -name '*.deb' | head -n 1)"

          if [[ -z "$appimage_path" || -z "$deb_path" ]]; then
            echo "Missing Linux artifacts in dist-desktop"
            exit 1
          fi

          chmod +x "$appimage_path"
          xvfb-run -a env APPIMAGE_EXTRACT_AND_RUN=1 node scripts/ci/smoke-packaged-app.mjs --executable "$appimage_path" --launch-arg=--no-sandbox

          sudo apt-get install -y "$(realpath "$deb_path")"
          deb_executable="$(command -v markflow || true)"
          if [[ -z "$deb_executable" ]]; then
            deb_executable="$(find /opt -maxdepth 3 -type f \( -name 'markflow' -o -name 'MarkFlow' \) | head -n 1)"
          fi
          if [[ -z "$deb_executable" ]]; then
            echo "Installed DEB did not expose a runnable MarkFlow binary"
            exit 1
          fi

          xvfb-run -a node scripts/ci/smoke-packaged-app.mjs --executable "$deb_executable" --launch-arg=--no-sandbox
